name: Release Cross Static Builds

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: arm32-le
            zig_targets: arm-linux-musleabi
            compat_cpu: arm32
            compat_zig_targets: arm-linux-musleabi
          - name: arm32-be
            zig_targets: armeb-linux-musleabi,armeb-linux-gnueabi
            compat_cpu: armeb
            compat_zig_targets: armeb-linux-musleabi,armeb-linux-gnueabi
          - name: aarch64-le
            zig_targets: aarch64-linux-musl
            compat_cpu: aarch64
            compat_zig_targets: aarch64-linux-musl
          - name: aarch64-be
            zig_targets: aarch64_be-linux-musl
            compat_cpu: aarch64_be
            compat_zig_targets: aarch64_be-linux-musl
          - name: mips-le
            zig_targets: mipsel-linux-musleabi,mipsel-linux-musleabihf
            compat_cpu: mipsel
            compat_zig_targets: mipsel-linux-musleabi
          - name: mips-be
            zig_targets: mips-linux-musleabi,mips-linux-musleabihf
            compat_cpu: mips
            compat_zig_targets: mips-linux-musleabi
          - name: mips64-le
            zig_targets: mips64el-linux-muslabi64,mips64el-linux-muslabin32,mips64el-linux-gnuabi64,mips64el-linux-gnuabin32
            compat_cpu: mips64el
            compat_zig_targets: mips64el-linux-muslabi64,mips64el-linux-gnuabi64
          - name: mips64-be
            zig_targets: mips64-linux-muslabi64,mips64-linux-muslabin32,mips64-linux-gnuabi64,mips64-linux-gnuabin32
            compat_cpu: mips64
            compat_zig_targets: mips64-linux-muslabi64,mips64-linux-gnuabi64
          - name: powerpc-le
            zig_targets: powerpc64le-linux-musl,powerpc64le-linux-gnu
            compat_cpu: powerpc64le
            compat_zig_targets: powerpc64le-linux-musl,powerpc64le-linux-gnu
          - name: powerpc-be
            zig_targets: powerpc-linux-musleabi,powerpc-linux-musleabihf,powerpc-linux-gnueabi,powerpc-linux-gnueabihf
            compat_cpu: powerpc
            compat_zig_targets: powerpc-linux-musleabi,powerpc-linux-gnueabi
          - name: x86
            zig_targets: x86-linux-musl
            compat_cpu: x86
            compat_zig_targets: x86-linux-musl
          - name: x86_64
            zig_targets: x86_64-linux-musl
            compat_cpu: x86_64
            compat_zig_targets: x86_64-linux-musl
          - name: riscv32
            zig_targets: riscv32-linux-musl,riscv32-linux-gnu
            compat_cpu: riscv32
            compat_zig_targets: riscv32-linux-musl,riscv32-linux-gnu
          - name: riscv64
            zig_targets: riscv64-linux-musl,riscv64-linux-gnu
            compat_cpu: riscv64
            compat_zig_targets: riscv64-linux-musl,riscv64-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Debug selected targets
        run: |
          echo "matrix.name=${{ matrix.name }}"
          echo "matrix.zig_targets=${{ matrix.zig_targets }}"
          echo "matrix.compat_cpu=${{ matrix.compat_cpu }}"
          echo "matrix.compat_zig_targets=${{ matrix.compat_zig_targets }}"

      - name: Install Zig
        run: |
          set -euo pipefail
          ZIG_VERSION=0.14.0
          curl -fsSL -o zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz"
          tar -xf zig.tar.xz
          echo "$PWD/zig-linux-x86_64-${ZIG_VERSION}" >> "$GITHUB_PATH"
          "$PWD/zig-linux-x86_64-${ZIG_VERSION}/zig" version

      - name: Build static binaries
        run: |
          set -euo pipefail
          test -f agent/embedded_linux_audit.c
          test -f agent/embedded_linux_audit_cmd.h
          test -f third_party/ncurses/configure
          test -f third_party/readline/readline.h
          mkdir -p dist/${{ matrix.name }}

          build_variant() {
            local variant="$1"
            local compat_cpu="$2"
            local target_csv="$3"
            local output_name="$4"
            local built=0

            IFS=',' read -ra TARGETS <<< "${target_csv}"
            for T in "${TARGETS[@]}"; do
              echo "Trying variant=${variant} target=${T} compat_cpu=${compat_cpu:-<none>}"
              if make clean \
                 && make static \
                      ELA_USE_READLINE=0 \
                      COMPAT_CPU="${compat_cpu}" \
                      CMAKE_C_COMPILER="$(command -v zig)" \
                      CMAKE_C_COMPILER_ARG1=cc \
                      CMAKE_C_COMPILER_TARGET="${T}" \
                      CC="zig cc -target ${T}"; then
                cp embedded_linux_audit "dist/${{ matrix.name }}/${output_name}"
                echo "Built ${variant} successfully with target: ${T}"
                built=1
                break
              fi
              echo "Target failed for ${variant}: ${T}"
            done

            if [ "${built}" -ne 1 ]; then
              echo "All candidate targets failed for ${{ matrix.name }} (${variant})"
              exit 1
            fi
          }

          build_variant default "" "${{ matrix.zig_targets }}" "embedded_linux_audit-${{ matrix.name }}"
          build_variant compat "${{ matrix.compat_cpu }}" "${{ matrix.compat_zig_targets }}" "embedded_linux_audit-${{ matrix.name }}-compat"

      - name: Upload matrix artifact
        uses: actions/upload-artifact@v4
        with:
          name: fw-tools-${{ matrix.name }}
          path: |
            dist/${{ matrix.name }}/embedded_linux_audit-${{ matrix.name }}
            dist/${{ matrix.name }}/embedded_linux_audit-${{ matrix.name }}-compat

  publish-release-assets:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/embedded_linux_audit-*
